# Streamlit Cloud Configuration
# For deployment on Streamlit Cloud and cloud-compatible environments

[theme]
primaryColor = "#D2691E"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F5F5F5"
textColor = "#2C2C2C"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "viewer"

[logger]
level = "info"

[client.showErrorDetails]
enabled = true

[server]
port = 8501
headless = true
runOnSave = true
maxUploadSize = 200
enableXsrfProtection = true
enableCORS = false

[browser]
gatherUsageStats = true
serverAddress = "localhost"
