# Streamlit Configuration
# Project: Afficionado Coffee Roasters — Product Analytics Dashboard

[theme]
primaryColor       = "#D2691E"
backgroundColor    = "#FDF6EC"
secondaryBackgroundColor = "#F5E6D3"
textColor          = "#1A0A00"
font               = "sans serif"

[client]
showErrorDetails   = true
toolbarMode        = "viewer"

[logger]
level = "info"

[server]
port               = 8501
headless           = true
runOnSave          = true
maxUploadSize      = 200
enableXsrfProtection = true
enableCORS         = false

[browser]
gatherUsageStats   = false
serverAddress      = "localhost"
